name: Build proposal PDF

on:
  push:
    paths:
      - "proposal/**"
      - ".github/workflows/build-pdf.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Korean fonts (NanumGothic)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - uses: typst-community/setup-typst@v3
        with:
          typst-version: "0.15.0"

      - name: Compile 1-page proposal PDF
        run: typst compile proposal/proposal.typ dist/proposal.pdf

      - name: Enforce max 2-page limit
        run: |
          pages=$(python3 -c "
          import re
          with open('dist/proposal.pdf', 'rb') as f:
              data = f.read()
          print(len(re.findall(rb'/Type\s*/Page[^s]', data)))
          ")
          echo "Detected pages: $pages"
          if [ "$pages" -gt 2 ]; then
            echo "::error::proposal.pdf has $pages pages, exceeds the 2-page limit."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: proposal-pdf
          path: dist/proposal.pdf
