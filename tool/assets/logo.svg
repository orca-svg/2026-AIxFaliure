<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Unknown Compass 로고 — 4분면 매트릭스 위에서 나침반 바늘이 Unknown Unknowns 사분면을 가리킨다">
  <!-- 브루탈리스트 포스터 플레이트: 하드 섀도 + 크림 플레이트 + 검정 보더 -->
  <rect x="46" y="46" width="440" height="440" fill="#000"/>
  <rect x="26" y="26" width="440" height="440" fill="#fffdf4" stroke="#000" stroke-width="12"/>

  <!-- 4분면: KK(파랑) KU(초록) / UK(앰버) UU(보라) — 도구의 사분면 팔레트 그대로 -->
  <rect x="76" y="76" width="170" height="170" fill="#2a78d6"/>
  <rect x="246" y="76" width="170" height="170" fill="#1baf7a"/>
  <rect x="76" y="246" width="170" height="170" fill="#eda100"/>
  <rect x="246" y="246" width="170" height="170" fill="#5b21b6"/>
  <line x1="246" y1="76" x2="246" y2="416" stroke="#000" stroke-width="8"/>
  <line x1="76" y1="246" x2="416" y2="246" stroke="#000" stroke-width="8"/>
  <rect x="76" y="76" width="340" height="340" fill="none" stroke="#000" stroke-width="10"/>

  <!-- UU 사분면의 물음표: 모른다는 것도 모르는 영역 -->
  <text x="376" y="404" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="82" font-weight="900" fill="#fffdf4">?</text>

  <!-- 나침반 바늘: 빨강 침이 UU를 가리킨다 -->
  <g transform="rotate(45 246 246)">
    <polygon points="368,246 246,222 246,270" fill="#c81e2c" stroke="#000" stroke-width="9" stroke-linejoin="round"/>
    <polygon points="124,246 246,222 246,270" fill="#fffdf4" stroke="#000" stroke-width="9" stroke-linejoin="round"/>
  </g>
  <circle cx="246" cy="246" r="24" fill="#fffdf4" stroke="#000" stroke-width="10"/>
  <circle cx="246" cy="246" r="7" fill="#000"/>
</svg>
